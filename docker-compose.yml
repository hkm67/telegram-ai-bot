services:
  tj-bot:
    build: .
    env_file: .env
    init: true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Uncomment if using Ollama on the host machine:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
